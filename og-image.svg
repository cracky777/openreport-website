<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0a1f"/>
      <stop offset="100%" stop-color="#1a0f2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Brand logo (dark-bg variant) -->
  <image href="logo-dark.png" x="80" y="80" height="92" preserveAspectRatio="xMinYMid meet"/>

  <!-- Headline -->
  <text x="80" y="290"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="64" font-weight="800" fill="#ffffff" letter-spacing="-2">Open source reporting</text>
  <text x="80" y="370"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="64" font-weight="800" fill="#ffffff" letter-spacing="-2">that <tspan fill="#a78bfa">you</tspan> control</text>

  <!-- Subhead -->
  <text x="80" y="440"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="24" font-weight="400" fill="#cbd5e1" letter-spacing="-0.3">
    Drag-and-drop dashboards. Self-hosted or managed in France.
  </text>
  <text x="80" y="476"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="24" font-weight="400" fill="#cbd5e1" letter-spacing="-0.3">
    PolyForm Noncommercial 1.0.0 — no vendor lock-in.
  </text>

  <!-- Feature pills -->
  <g transform="translate(80, 540)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="600">
    <g>
      <rect x="0" y="0" width="174" height="40" rx="20" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.4)"/>
      <text x="87" y="25" text-anchor="middle" fill="#a78bfa">Row-Level Security</text>
    </g>
    <g transform="translate(190, 0)">
      <rect x="0" y="0" width="156" height="40" rx="20" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.4)"/>
      <text x="78" y="25" text-anchor="middle" fill="#a78bfa">12+ visualizations</text>
    </g>
    <g transform="translate(362, 0)">
      <rect x="0" y="0" width="180" height="40" rx="20" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.4)"/>
      <text x="90" y="25" text-anchor="middle" fill="#a78bfa">Workspaces &amp; roles</text>
    </g>
    <g transform="translate(558, 0)">
      <rect x="0" y="0" width="156" height="40" rx="20" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.4)"/>
      <text x="78" y="25" text-anchor="middle" fill="#a78bfa">Multi-database</text>
    </g>
  </g>

  <!-- URL bottom-right -->
  <text x="1120" y="595" text-anchor="end"
        font-family="'JetBrains Mono', monospace"
        font-size="18" font-weight="600" fill="#94a3b8">openreport.io</text>
</svg>
