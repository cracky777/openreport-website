<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0a1f"/>
      <stop offset="100%" stop-color="#1a0f2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.25" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="oRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decorative line chart silhouette in the lower-right, low-opacity -->
  <g opacity="0.35">
    <path d="M 660 470 L 740 420 L 820 450 L 900 360 L 980 390 L 1060 320 L 1140 340"
          stroke="url(#lineGlow)" stroke-width="2.5" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Data points -->
    <circle cx="660" cy="470" r="3.5" fill="#a78bfa" opacity="0.6"/>
    <circle cx="740" cy="420" r="3.5" fill="#a78bfa" opacity="0.7"/>
    <circle cx="820" cy="450" r="3.5" fill="#a78bfa" opacity="0.7"/>
    <circle cx="900" cy="360" r="3.5" fill="#a78bfa" opacity="0.85"/>
    <circle cx="980" cy="390" r="3.5" fill="#a78bfa" opacity="0.85"/>
    <circle cx="1060" cy="320" r="3.5" fill="#a78bfa"/>
    <circle cx="1140" cy="340" r="3.5" fill="#a78bfa"/>
    <!-- Subtle area fill below the line -->
    <path d="M 660 470 L 740 420 L 820 450 L 900 360 L 980 390 L 1060 320 L 1140 340 L 1140 540 L 660 540 Z"
          fill="#7c3aed" opacity="0.08"/>
  </g>

  <!-- Brand: stylised "O" ring icon (drawn inline so the SVG renders
       standalone without depending on an external icon file) + wordmark -->
  <circle cx="114" cy="98" r="30" fill="none" stroke="url(#oRing)" stroke-width="11"/>
  <text x="160" y="113"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="34" font-weight="700" fill="#ffffff" letter-spacing="-1">Open Report</text>

  <!-- Headline -->
  <text x="80" y="280"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="62" font-weight="800" fill="#ffffff" letter-spacing="-2">Open source reporting</text>
  <text x="80" y="358"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="62" font-weight="800" fill="#ffffff" letter-spacing="-2">that <tspan fill="#a78bfa">you</tspan> control</text>

  <!-- Subhead -->
  <text x="80" y="420"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="22" font-weight="400" fill="#cbd5e1" letter-spacing="-0.3">
    Drag-and-drop dashboards. Hosted in France or self-hosted.
  </text>
  <text x="80" y="454"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="22" font-weight="400" fill="#cbd5e1" letter-spacing="-0.3">
    Source-available — your data, your tools.
  </text>

  <!-- Feature pills -->
  <g transform="translate(80, 520)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="600">
    <g>
      <rect x="0" y="0" width="172" height="40" rx="20" fill="rgba(167,139,250,0.14)" stroke="rgba(167,139,250,0.42)"/>
      <text x="86" y="25" text-anchor="middle" fill="#a78bfa">Row-Level Security</text>
    </g>
    <g transform="translate(184, 0)">
      <rect x="0" y="0" width="158" height="40" rx="20" fill="rgba(167,139,250,0.14)" stroke="rgba(167,139,250,0.42)"/>
      <text x="79" y="25" text-anchor="middle" fill="#a78bfa">12+ visualizations</text>
    </g>
    <g transform="translate(354, 0)">
      <rect x="0" y="0" width="146" height="40" rx="20" fill="rgba(167,139,250,0.14)" stroke="rgba(167,139,250,0.42)"/>
      <text x="73" y="25" text-anchor="middle" fill="#a78bfa">Workspaces</text>
    </g>
    <g transform="translate(512, 0)">
      <rect x="0" y="0" width="158" height="40" rx="20" fill="rgba(167,139,250,0.14)" stroke="rgba(167,139,250,0.42)"/>
      <text x="79" y="25" text-anchor="middle" fill="#a78bfa">Multi-database</text>
    </g>
  </g>

  <!-- URL bottom-right -->
  <text x="1120" y="595" text-anchor="end"
        font-family="'JetBrains Mono', monospace"
        font-size="18" font-weight="600" fill="#94a3b8">openreport.io</text>
</svg>
