<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0a1f"/>
      <stop offset="100%" stop-color="#1a0f2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="oRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decorative line chart, right side, subtle -->
  <g opacity="0.55">
    <path d="M 700 470 L 790 410 L 880 440 L 970 320 L 1060 360 L 1140 240"
          stroke="url(#lineColor)" stroke-width="3.5" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 700 470 L 790 410 L 880 440 L 970 320 L 1060 360 L 1140 240 L 1140 540 L 700 540 Z"
          fill="#7c3aed" opacity="0.10"/>
    <circle cx="700"  cy="470" r="6" fill="#a78bfa"/>
    <circle cx="790"  cy="410" r="6" fill="#a78bfa"/>
    <circle cx="880"  cy="440" r="6" fill="#a78bfa"/>
    <circle cx="970"  cy="320" r="6" fill="#a78bfa"/>
    <circle cx="1060" cy="360" r="6" fill="#a78bfa"/>
    <circle cx="1140" cy="240" r="6" fill="#a78bfa"/>
  </g>

  <!-- Brand mark, top-left, tight & subtle -->
  <g transform="translate(64, 60)">
    <circle cx="13" cy="13" r="11" fill="none" stroke="url(#oRing)" stroke-width="4"/>
    <text x="38" y="19"
          font-family="Arial, Helvetica, sans-serif"
          font-size="20" font-weight="700"
          fill="#ffffff" letter-spacing="-0.5">Open Report</text>
  </g>

  <!-- Headline -->
  <text x="64" y="290"
        font-family="Arial, Helvetica, sans-serif"
        font-size="78" font-weight="800"
        fill="#ffffff" letter-spacing="-2.5">Open source</text>
  <text x="64" y="378"
        font-family="Arial, Helvetica, sans-serif"
        font-size="78" font-weight="800"
        fill="#ffffff" letter-spacing="-2.5">reporting platform</text>

  <!-- Accent underline under "platform" -->
  <rect x="64" y="396" width="190" height="5" rx="2.5" fill="url(#lineColor)"/>

  <!-- Subhead -->
  <text x="64" y="448"
        font-family="Arial, Helvetica, sans-serif"
        font-size="26" font-weight="500"
        fill="#cbd5e1" letter-spacing="-0.3">Self-hosted Power BI &amp; Looker Studio alternative.</text>
  <text x="64" y="486"
        font-family="Arial, Helvetica, sans-serif"
        font-size="26" font-weight="400"
        fill="#94a3b8" letter-spacing="-0.3">Row-level security, scheduled emails, multi-database.</text>

  <!-- URL bottom-right -->
  <text x="1140" y="592" text-anchor="end"
        font-family="Arial, Helvetica, sans-serif"
        font-size="20" font-weight="600" fill="#a78bfa" letter-spacing="-0.3">openreport.io</text>
</svg>
